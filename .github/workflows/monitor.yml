name: Monitor Radar MS Unificado

on:
  schedule:
    # Roda a cada 3 horas (no minuto 0)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Permite rodar o bot manualmente no GitHub clicando em "Run workflow"

jobs:
  monitorar:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Permissão fundamental para o bot salvar as alterações do JSON no repositório

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar Script de Monitoramento
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit e Push do Database
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add database.json
          # O commit e o push só acontecem se houver mudanças no database.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database.json [skip ci]" && git push)
