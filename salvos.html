<html class="dark" lang="pt-BR"><head>

                      "primary-container": "#e2e2e2",

                      "on-secondary-container": "#d6e5ff",

<style>
        body { background-color: #0A0A0A; }
        body { min-height: max(884px, 100dvh); }
      </style>
  </head>
<body class="bg-background dark:bg-background text-on-surface antialiased min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#0A0A0A] border-b border-[#262626] h-14 flex items-center justify-between px-4 md:px-margin-desktop">
    <button aria-label="Search" id="search-btn" class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-100 flex items-center justify-center w-10 h-10">
        <span class="material-symbols-outlined">search</span>
    </button>
    <h1 id="header-title" class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Radar MS</h1>
    <button aria-label="Refresh" id="refresh-btn" class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-100 flex items-center justify-center w-10 h-10">
        <span class="material-symbols-outlined">sync</span>
    </button>
</header>
<!-- Main Content -->
<main class="pt-24 px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto">
<section class="mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-sm">Salvos</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">Suas oportunidades e editais salvos para consulta rápida.</p>
</section>
<section id="saved-feed" class="flex flex-col gap-sm md:gap-md">
    <div class="text-on-surface-variant text-center p-md">Carregando itens salvos...</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#0A0A0A] border-t border-[#262626]">
    <div class="flex justify-around items-center h-16 pb-safe px-4 max-w-md mx-auto">
        <!-- Feed -->
        <a href="index.html" class="flex flex-col items-center justify-center text-[#c4c7c8] hover:text-primary transition-colors active:scale-95 transition-transform duration-150 w-16">
            <span class="material-symbols-outlined mb-1">rss_feed</span>
            <span class="font-label-sm text-[10px]">Feed</span>
        </a>
        <!-- Saved (ACTIVE) -->
        <a href="salvos.html" class="flex flex-col items-center justify-center text-primary font-bold active:scale-95 transition-transform duration-150 w-16">
            <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">bookmark</span>
            <span class="font-label-sm text-[10px]">Salvos</span>
        </a>
        <!-- Alerts -->
        <a href="alertas.html" class="flex flex-col items-center justify-center text-[#c4c7c8] hover:text-primary transition-colors active:scale-95 transition-transform duration-150 w-16">
            <span class="material-symbols-outlined mb-1">notifications</span>
            <span class="font-label-sm text-[10px]">Alertas</span>
        </a>
        <!-- Profile -->
        <a href="perfil.html" class="flex flex-col items-center justify-center text-[#c4c7c8] hover:text-primary transition-colors active:scale-95 transition-transform duration-150 w-16">
            <span class="material-symbols-outlined mb-1">person</span>
            <span class="font-label-sm text-[10px]">Perfil</span>
        </a>
    </div>
</nav>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const feed = document.getElementById('saved-feed');
        
        fetch('database.json')
            .then(r => {
                if (!r.ok) throw new Error("Database não encontrado");
                return r.json();
            })
            .then(data => {
                const saved = JSON.parse(localStorage.getItem('saved_vagas') || '[]');
                const vagasSalvas = data.filter(vaga => saved.includes(vaga.id) && !vaga.silent);
                
                if (vagasSalvas.length === 0) {
                    feed.innerHTML = '<div class="text-on-surface-variant text-center p-md">Nenhuma vaga salva. Explore o Feed para salvar oportunidades.</div>';
                    return;
                }

                feed.innerHTML = '';
                vagasSalvas.forEach(vaga => {
                    feed.innerHTML += `
                    <article id="art-${vaga.id}" class="bg-[#171717] border border-[#262626] p-md rounded-DEFAULT flex flex-col md:flex-row md:items-center justify-between gap-md group hover:border-[#444748] transition-colors duration-300">
                        <div class="flex flex-col gap-xs flex-1">
                            <div class="flex items-center gap-xs mb-xs">
                                <span class="px-xs py-base bg-[#262626] text-[#c4c7c8] font-label-sm text-label-sm rounded-DEFAULT uppercase tracking-wider">${vaga.fonte}</span>
                                <span class="font-label-sm text-label-sm text-on-surface-variant">•</span>
                                <span class="font-label-sm text-label-sm text-on-surface-variant">${vaga.data}</span>
                            </div>
                            <h2 class="font-headline-md text-headline-md text-primary">${vaga.titulo}</h2>
                            <p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">${vaga.detalhes}</p>
                        </div>
                        <div class="flex items-center gap-sm mt-sm md:mt-0 pt-sm md:pt-0 border-t border-[#262626] md:border-t-0 justify-between md:justify-end w-full md:w-auto">
                            <a href="${vaga.link}" target="_blank" class="bg-primary text-[#141313] font-label-sm text-label-sm px-sm py-xs rounded-DEFAULT hover:opacity-90 transition-opacity">Acessar Edital</a>
                            <button onclick="removeSave('${vaga.id}')" aria-label="Remove from saved" class="w-10 h-10 flex items-center justify-center rounded-DEFAULT border border-[#262626] hover:border-primary transition-colors text-primary group">
                                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bookmark</span>
                            </button>
                        </div>
                    </article>
                    `;
                });
            })
            .catch(e => {
                console.error(e);
                feed.innerHTML = '<div class="text-error p-sm text-center">Erro ao carregar os dados. Verifique se o database.json existe.</div>';
            });

        window.removeSave = function(id) {
            let saved = JSON.parse(localStorage.getItem('saved_vagas') || '[]');
            saved = saved.filter(x => x !== id);
            localStorage.setItem('saved_vagas', JSON.stringify(saved));
            
            const art = document.getElementById(`art-${id}`);
            if(art) art.remove();

            if (saved.length === 0) {
                feed.innerHTML = '<div class="text-on-surface-variant text-center p-md">Nenhuma vaga salva. Explore o Feed para salvar oportunidades.</div>';
            }
        };
    });

    // Search
    const searchBtn = document.getElementById('search-btn');
    const titleEl = document.getElementById('header-title');
    let searchInput = null;
    searchBtn.addEventListener('click', () => {
        if (!searchInput) {
            titleEl.style.display = 'none';
            searchInput = document.createElement('input');
            searchInput.type = 'text';
            searchInput.placeholder = 'Buscar salvos...';
            searchInput.className = 'bg-[#171717] border border-[#262626] text-primary px-3 py-1 rounded w-full max-w-[180px] text-sm focus:outline-none focus:border-[#444748] mx-2';
            searchBtn.insertAdjacentElement('afterend', searchInput);
            searchInput.focus();
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('#saved-feed article').forEach(art => {
                    art.style.display = art.innerText.toLowerCase().includes(query) ? 'flex' : 'none';
                });
            });
        } else {
            searchInput.remove();
            searchInput = null;
            titleEl.style.display = 'block';
            document.querySelectorAll('#saved-feed article').forEach(art => art.style.display = 'flex');
        }
    });

    // Refresh
    document.getElementById('refresh-btn').addEventListener('click', () => {
        document.querySelector('#refresh-btn span').classList.add('animate-spin');
        setTimeout(() => window.location.reload(), 500);
    });
</script>
</body></html>
